<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Department Setup | Attendance @TEC</title><style>body{font-family:system-ui,sans-serif;max-width:1000px;margin:2rem auto;padding:0 1rem;background:#f6f8fc;color:#13213a}section{background:white;padding:1.2rem;margin:1rem 0;border-radius:10px;box-shadow:0 1px 3px #d7dce5}input,select,button{padding:.6rem;margin:.25rem;border:1px solid #cbd5e1;border-radius:5px}button{background:#2563eb;color:#fff;border:0}button.danger{background:#b91c1c}.message{min-height:1.5rem;color:#475569}table{border-collapse:collapse;width:100%}td,th{padding:.5rem;text-align:left;border-bottom:1px solid #e2e8f0}</style></head><body><p><a href="admin.html">← Dashboard</a></p><h1>Department data setup</h1><p class="message" id="message"></p><section><h2>Faculty</h2><form id="faculty"><input name="faculty_id" placeholder="Faculty ID" required><input name="name" placeholder="Name" required><input name="email" placeholder="Email"><input name="department" value="Computer Science"><input name="password" type="password" placeholder="Initial password" required><button>Add faculty</button></form><div id="facultyList"></div></section><section><h2>Students</h2><form id="students"><input name="reg_no" placeholder="Register number" required><input name="name" placeholder="Name" required><input name="section" value="A"><input name="year" type="number" value="1"><input name="department" value="Computer Science"><input name="password" type="password" placeholder="Initial password" required><button>Add student</button></form></section><section><h2>Subjects</h2><form id="subjects"><input name="code" placeholder="Subject code" required><input name="name" placeholder="Subject name" required><select id="faculty_id" name="faculty_id" required></select><input name="section" value="A"><input name="year" type="number" value="1"><input name="department" value="Computer Science"><button>Add subject</button></form></section><section><h2>Remove sample data</h2><p>This permanently removes sample students, faculty, subjects, attendance, assignments, and schedules, while preserving HOD and Super Admin accounts.</p><button class="danger" onclick="clearSample()">Remove sample data</button></section><script>const api='/api/admin',msg=document.querySelector('#message');function note(v){msg.textContent=v}async function call(p,o={}){let r=await fetch(api+p,{headers:{'Content-Type':'application/json'},...o}),d=await r.json();if(!r.ok)throw Error(d.error||'Request failed');return d}function data(e){return Object.fromEntries(new FormData(e.target))}async function faculty(){try{let f=await call('/faculty');document.querySelector('#facultyList').innerHTML='<table><tr><th>ID</th><th>Name</th><th>Department</th></tr>'+f.map(x=>`<tr><td>${x.faculty_id}</td><td>${x.name}</td><td>${x.department}</td></tr>`).join('');document.querySelector('#faculty_id').innerHTML='<option value="">Assign faculty</option>'+f.map(x=>`<option value="${x.id}">${x.name} (${x.faculty_id})</option>`).join('')}catch(e){note(e.message)}}for(const id of ['faculty','students','subjects'])document.querySelector('#'+id).onsubmit=async e=>{e.preventDefault();try{await call('/'+id,{method:'POST',body:JSON.stringify(data(e))});e.target.reset();note('Saved successfully');faculty()}catch(x){note(x.message)}};async function clearSample(){let confirmation=prompt('Type REMOVE SAMPLE DATA to continue');if(!confirmation)return;try{await call('/clear-sample-data',{method:'POST',body:JSON.stringify({confirmation})});note('Sample data removed');faculty()}catch(e){note(e.message)}}faculty();</script></body></html>
